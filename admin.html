<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administrador | INZUMOS</title>
  <style>
    :root{--ink:#17372d;--green:#285b45;--orange:#e8743b;--cream:#f4f1e8;--line:#d9dfd6;--muted:#64756f;--paper:#fffdf8}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font:15px/1.45 Inter,system-ui,sans-serif}button,input,select{font:inherit}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,100%);background:#fff;padding:38px;border-radius:24px;box-shadow:0 24px 70px #17372d20}.brand{font-size:22px;font-weight:900;letter-spacing:.13em}.brand i{display:inline-block;width:10px;height:10px;background:var(--orange);border-radius:50%;margin-right:8px}.login h1{font:700 36px Georgia,serif;margin:40px 0 8px}.muted{color:var(--muted)}label{display:grid;gap:7px;font-weight:750;margin-top:18px}input,select{width:100%;padding:12px;border:1px solid #bdc9c2;border-radius:10px;background:#fff;color:var(--ink)}button{border:0;border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}.primary{background:var(--orange);color:#fff;width:100%;margin-top:24px}.error{color:#9a3823;background:#f6ded0;padding:10px 12px;border-radius:9px;margin-top:16px}.app{min-height:100vh}.top{background:var(--ink);color:#fff;padding:18px 4vw;display:flex;align-items:center;justify-content:space-between;gap:20px}.top-right{display:flex;align-items:center;gap:16px}.logout{background:#ffffff18;color:#fff}.main{width:min(1400px,92vw);margin:34px auto}.heading{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:22px}.heading h1{font:700 38px Georgia,serif;margin:0}.controls{display:grid;grid-template-columns:minmax(220px,1fr) 190px;gap:12px;margin-bottom:18px}.panel{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 35px #17372d0c}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1050px}th,td{text-align:left;padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:#fafbf8}td strong{display:block}.pill{display:inline-block;padding:5px 9px;border-radius:99px;background:#e6edd0;font-size:12px;font-weight:800}.status{min-width:130px;padding:8px}.view{background:var(--ink);color:#fff;padding:8px 12px}.empty{text-align:center;padding:55px;color:var(--muted)}dialog{width:min(680px,calc(100% - 28px));border:0;border-radius:20px;padding:0;box-shadow:0 24px 80px #0004}dialog::backdrop{background:#0a1e18bb}.detail-head{padding:24px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.detail-head h2{margin:0;font:700 28px Georgia,serif}.close{background:var(--cream);font-size:20px;padding:8px 14px}.detail-body{padding:26px 28px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.detail-grid div{min-width:0}.detail-grid small{display:block;color:var(--muted);font-weight:750;margin-bottom:4px}.full{grid-column:1/-1;white-space:pre-wrap;overflow-wrap:anywhere}@media(max-width:650px){.top{align-items:flex-start}.top-right{align-items:flex-end;flex-direction:column}.heading{align-items:flex-start;flex-direction:column}.controls{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}.full{grid-column:auto}.login-card{padding:28px}}
  </style>
</head>
<body>
  <section class="login" id="login"><form class="login-card" id="login-form"><div class="brand"><i></i>INZUMOS</div><h1>Administrador</h1><p class="muted">Acceso privado a solicitudes de cotización.</p><label>Correo<input id="email" name="email" type="email" autocomplete="username" required></label><label>Contraseña<input name="password" type="password" autocomplete="current-password" required></label><div id="login-error" class="error hidden"></div><button class="primary" type="submit">Ingresar →</button></form></section>
  <section class="app hidden" id="app"><header class="top"><div class="brand"><i></i>INZUMOS · ADMIN</div><div class="top-right"><span id="user"></span><button class="logout" id="logout">Cerrar sesión</button></div></header><main class="main"><div class="heading"><div><h1>Cotizaciones</h1><div class="muted" id="summary">Cargando…</div></div><button id="refresh">Actualizar</button></div><div class="controls"><input id="search" type="search" placeholder="Buscar negocio, contacto, ciudad o producto"><select id="filter"><option value="">Todos los estados</option><option>nuevo</option><option>contactado</option><option>cotizado</option><option>cerrado</option><option>descartado</option></select></div><div class="panel"><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Negocio / contacto</th><th>Ubicación</th><th>Pedido</th><th>Estado</th><th></th></tr></thead><tbody id="rows"></tbody></table></div><div class="empty hidden" id="empty">No hay cotizaciones que coincidan.</div></div></main></section>
  <dialog id="detail"><div class="detail-head"><h2>Detalle de cotización</h2><button class="close" aria-label="Cerrar">×</button></div><div class="detail-body" id="detail-body"></div></dialog>
  <script>
    const $=s=>document.querySelector(s);let quotes=[];
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const date=v=>new Intl.DateTimeFormat('es-CO',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v));
    async function api(url,options={}){const r=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(options.headers||{})}});const data=await r.json().catch(()=>({}));if(!r.ok)throw Object.assign(new Error(data.error||'Ocurrió un error.'),{status:r.status});return data}
    function showLogin(){ $('#app').classList.add('hidden');$('#login').classList.remove('hidden') }
    function showApp(){ $('#login').classList.add('hidden');$('#app').classList.remove('hidden') }
    async function load(){try{const data=await api('/api/admin/quotes');quotes=data.quotes;$('#user').textContent=data.user;showApp();render()}catch(e){if(e.status===401||e.status===403)showLogin();else alert(e.message)}}
    function render(){const q=$('#search').value.toLowerCase(),status=$('#filter').value;const list=quotes.filter(x=>(!status||x.status===status)&&[x.business_name,x.contact_name,x.city,x.products,x.email].some(v=>String(v||'').toLowerCase().includes(q)));$('#summary').textContent=`${list.length} de ${quotes.length} solicitudes`;$('#rows').innerHTML=list.map(x=>`<tr><td>${esc(date(x.created_at))}</td><td><strong>${esc(x.business_name)}</strong>${esc(x.contact_name)}<br><span class="muted">${esc(x.phone)}</span></td><td>${esc(x.city)}${x.district?`<br><span class="muted">${esc(x.district)}</span>`:''}</td><td><span class="pill">${esc(x.category)}</span><br>${esc(x.products).slice(0,90)}${x.products.length>90?'…':''}</td><td><select class="status" data-status="${x.id}">${['nuevo','contactado','cotizado','cerrado','descartado'].map(s=>`<option ${s===x.status?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="view" data-view="${x.id}">Ver</button></td></tr>`).join('');$('#empty').classList.toggle('hidden',!!list.length)}
    $('#login-form').addEventListener('submit',async e=>{e.preventDefault();const b=e.submitter;b.disabled=true;$('#login-error').classList.add('hidden');try{await api('/api/admin/login',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget)))});e.currentTarget.reset();await load()}catch(err){$('#login-error').textContent=err.message;$('#login-error').classList.remove('hidden')}finally{b.disabled=false}});
    $('#rows').addEventListener('change',async e=>{if(!e.target.dataset.status)return;const item=quotes.find(x=>x.id===e.target.dataset.status),old=item.status;item.status=e.target.value;try{await api('/api/admin/quotes',{method:'PATCH',body:JSON.stringify({id:item.id,status:item.status})})}catch(err){item.status=old;e.target.value=old;alert(err.message)}});
    $('#rows').addEventListener('click',e=>{const id=e.target.dataset.view;if(!id)return;const x=quotes.find(y=>y.id===id);$('#detail-body').innerHTML=`<div class="detail-grid"><div><small>Negocio</small>${esc(x.business_name)}</div><div><small>Contacto</small>${esc(x.contact_name)}</div><div><small>Teléfono</small><a href="tel:${esc(x.phone)}">${esc(x.phone)}</a></div><div><small>Correo</small><a href="mailto:${esc(x.email)}">${esc(x.email)}</a></div><div><small>Ciudad / distrito</small>${esc(x.city)}${x.district?' · '+esc(x.district):''}</div><div><small>Fecha requerida</small>${esc(x.delivery_date||'No indicada')}</div><div><small>Frecuencia</small>${esc(x.frequency||'No indicada')}</div><div><small>Recibida</small>${esc(date(x.created_at))}</div><div class="full"><small>Productos y cantidades</small>${esc(x.products)}</div><div class="full"><small>Comentarios</small>${esc(x.comments||'Sin comentarios')}</div></div>`;$('#detail').showModal()});
    $('#detail .close').onclick=()=>$('#detail').close();$('#search').oninput=render;$('#filter').onchange=render;$('#refresh').onclick=load;$('#logout').onclick=async()=>{await api('/api/admin/logout',{method:'POST'});showLogin()};load();
  </script>
</body></html>
